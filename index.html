<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LifeSim AI Pro+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#111;
  color:white;
  transition:0.5s;
}

#matrixCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  display:none;
  background:black;
}

.container{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:15px;
  width:850px;
  margin:auto;
}

input,select,button{
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}

button{
  background:#00c9a7;
  color:white;
  cursor:pointer;
}

.result{
  margin-top:20px;
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:10px;
  display:none;
}

.result-box{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:12px;
  margin:15px 0;
  text-align:left;
}

.progress-bar{
  width:100%;
  background:#444;
  border-radius:20px;
  overflow:hidden;
}

.progress{
  height:20px;
  background:#bb00ff;
  width:0%;
  transition:0.6s;
}

.advanced-theme{
  background:linear-gradient(135deg,#1a0033,#330066,#4b0082);
}
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<h1>📖 LifeSim AI - PRO+</h1>

<div class="container">

<input type="text" id="name" placeholder="Nhập tên"><br>
<input type="date" id="birthdate"><br>

<label>
<input type="checkbox" id="advancedMode">
🔮 Bật phân tích nâng cao
</label><br>

<select id="personality">
<option value="logic">Logic</option>
<option value="creative">Sáng tạo</option>
<option value="social">Hướng ngoại</option>
<option value="leader">Lãnh đạo</option>
<option value="analyst">Phân tích</option>
</select>

<select id="career">
<option value="dev">Lập trình viên</option>
<option value="designer">Thiết kế</option>
<option value="data">Kỹ sư dữ liệu</option>
<option value="game">Game Dev</option>
<option value="business">Doanh nhân</option>
</select>

<br>
<button onclick="simulate()">Phân tích</button>

<div class="result" id="output">

<div class="result-box">
<h2>🚀 5 năm</h2>
<p id="story5"></p>
</div>

<div class="result-box">
<h2>🌟 10 năm</h2>
<p id="story10"></p>
</div>

<div class="result-box">
<h2>⚠ Vấn đề có thể gặp</h2>
<p id="vanDe"></p>
</div>

<div class="result-box">
<h2>🔮 Nâng cao</h2>
<p id="advancedResult"></p>
</div>

<h3>Mức độ phù hợp</h3>
<div class="progress-bar">
<div class="progress" id="matchBar"></div>
</div>

<canvas id="skillChart"></canvas>

</div>
</div>

<script>

/* ===== RANDOM UTILS ===== */

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function randomFrom(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function randomMultiple(arr,count){
  let shuffled=[...arr].sort(()=>0.5-Math.random());
  return shuffled.slice(0,count);
}

/* ===== MATRIX ===== */

let matrixAnimationId;

function startMatrix(){
  const canvas=document.getElementById("matrixCanvas");
  const ctx=canvas.getContext("2d");

  canvas.style.display="block";
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const fontSize=16;
  const columns=canvas.width/fontSize;
  const drops=Array(Math.floor(columns)).fill(1);

  function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#c84dff";
    ctx.shadowColor="#ff00ff";
    ctx.shadowBlur=15;
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
      const text=letters[Math.floor(Math.random()*letters.length)];
      ctx.fillText(text,i*fontSize,drops[i]*fontSize);
      if(drops[i]*fontSize>canvas.height&&Math.random()>0.975){
        drops[i]=0;
      }
      drops[i]++;
    }
  }

  function animate(){
    draw();
    matrixAnimationId=requestAnimationFrame(animate);
  }

  animate();
}

function stopMatrix(){
  document.getElementById("matrixCanvas").style.display="none";
  cancelAnimationFrame(matrixAnimationId);
}

/* ===== SIMULATE ===== */

let chartInstance;

function simulate(){

let name=document.getElementById("name").value||"Bạn";
let personality=document.getElementById("personality").value;
let career=document.getElementById("career").value;
let advanced=document.getElementById("advancedMode").checked;

let salary5=rand(20,40);
let salary10=rand(50,120);

let desc5=randomFrom([
"Bạn tham gia nhiều dự án lớn.",
"Bạn làm việc trong môi trường quốc tế.",
"Bạn phát triển kỹ năng chuyên sâu."
]);

let desc10=randomFrom([
"Bạn trở thành chuyên gia đầu ngành.",
"Bạn quản lý một team lớn.",
"Bạn mở dự án riêng."
]);

let vanDeList=[
"Deadline dồn dập.",
"Áp lực từ khách hàng.",
"Công nghệ thay đổi nhanh.",
"Áp lực tài chính.",
"Thiếu nhân lực."
];

let randomVanDe=randomMultiple(vanDeList,3);

let vanDeHTML="<ul>";
randomVanDe.forEach(v=>{
  vanDeHTML+="<li>"+v+"</li>";
});
vanDeHTML+="</ul>";

document.getElementById("vanDe").innerHTML=vanDeHTML;

let match=rand(70,95);

if(advanced){
  startMatrix();
  document.body.classList.add("advanced-theme");
  match+=5;
}else{
  stopMatrix();
  document.body.classList.remove("advanced-theme");
}

if(match>100) match=100;

document.getElementById("output").style.display="block";

document.getElementById("story5").innerText=
name+" - 5 năm: "+desc5+" Thu nhập: "+salary5+" triệu/tháng";

document.getElementById("story10").innerText=
name+" - 10 năm: "+desc10+" Thu nhập: "+salary10+" triệu/tháng";

document.getElementById("advancedResult").innerText=
advanced?"Phân tích chuyên sâu đã kích hoạt.":"";

let bar=document.getElementById("matchBar");
bar.style.width="0%";
setTimeout(()=>{bar.style.width=match+"%";},200);

if(chartInstance) chartInstance.destroy();

chartInstance=new Chart(document.getElementById("skillChart"),{
type:'bar',
data:{
labels:["Logic","Sáng tạo","Giao tiếp"],
datasets:[{
label:"Kỹ năng",
data:[rand(60,100),rand(60,100),rand(60,100)],
backgroundColor:"#bb00ff",
borderRadius:8
}]
},
options:{
responsive:true,
scales:{y:{beginAtZero:true,max:100}}
}
});

}

</script>

</body>
</html>
