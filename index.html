<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LifeSim AI Pro+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#111;
  color:white;
  transition:0.5s;
}

#matrixCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  display:none;
  background:linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:15px;
  width:850px;
  margin:auto;
}

input,select,button{
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}

button{
  background:#00c9a7;
  color:white;
  cursor:pointer;
}

.result{
  margin-top:20px;
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:10px;
  display:none;
}

.result-box{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:12px;
  margin:15px 0;
  text-align:left;
}

.progress-bar{
  width:100%;
  background:#444;
  border-radius:20px;
  overflow:hidden;
}

.progress{
  height:20px;
  background:#bb00ff;
  width:0%;
  transition:0.6s;
}

.advanced-theme{
  background:linear-gradient(135deg,#1a0033,#330066,#4b0082);
}
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<h1>📖 LifeSim AI - PRO+</h1>

<div class="container">

<input type="text" id="name" placeholder="Nhập tên"><br>
<input type="date" id="birthdate"><br>

<label>
<input type="checkbox" id="advancedMode">
🔮 Bật phân tích nâng cao
</label><br>

<select id="personality">
<option value="logic">Logic</option>
<option value="creative">Sáng tạo</option>
<option value="social">Hướng ngoại</option>
<option value="leader">Lãnh đạo</option>
<option value="analyst">Phân tích</option>
<option value="independent">Độc lập</option>
<option value="adaptive">Thích nghi nhanh</option>
</select>

<select id="career">
<option value="dev">Lập trình viên</option>
<option value="designer">Thiết kế</option>
<option value="data">Kỹ sư dữ liệu</option>
<option value="marketing">Tiếp thị kỹ thuật số</option>
<option value="teacher">Giáo viên</option>
<option value="game">Game Dev</option>
<option value="business">Doanh nhân</option>
</select>

<br>
<button onclick="simulate()">Phân tích</button>

<div class="result" id="output">

<div class="result-box">
<h2>🚀 5 năm</h2>
<p id="story5"></p>
</div>

<div class="result-box">
<h2>🌟 10 năm</h2>
<p id="story10"></p>
</div>

<div class="result-box">
<h2>⚠️ Vấn đề có thể gặp</h2>
<p id="vanDe"></p>
</div>

<div class="result-box">
<h2>🔮 Phân tích nâng cao</h2>
<p id="advancedResult"></p>
</div>

<h3>Mức độ phù hợp</h3>
<div class="progress-bar">
<div class="progress" id="matchBar"></div>
</div>

<canvas id="skillChart"></canvas>

</div>
</div>

<script>

/* ===== RANDOM UTILS ===== */

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function randomFrom(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function randomMultiple(arr,count){
  let shuffled=[...arr].sort(()=>0.5-Math.random());
  return shuffled.slice(0,count);
}

/* ===== MATRIX ===== */

let matrixAnimationId;

function startMatrix(){
  const canvas=document.getElementById("matrixCanvas");
  const ctx=canvas.getContext("2d");

  canvas.style.display="block";
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const fontSize=16;
  const columns=canvas.width/fontSize;
  const drops=Array(Math.floor(columns)).fill(1);

  function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#c84dff";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
      const text=letters[Math.floor(Math.random()*letters.length)];
      ctx.fillText(text,i*fontSize,drops[i]*fontSize);
      if(drops[i]*fontSize>canvas.height&&Math.random()>0.975){
        drops[i]=0;
      }
      drops[i]++;
    }
  }

  function animate(){
    draw();
    matrixAnimationId=requestAnimationFrame(animate);
  }

  animate();
}

function stopMatrix(){
  document.getElementById("matrixCanvas").style.display="none";
  cancelAnimationFrame(matrixAnimationId);
}

/* ===== DATA ===== */

const vanDeTheoNganh={
dev:["Deadline dồn dập.","Sửa bug liên tục.","Công nghệ đổi nhanh.","Áp lực khách hàng.","Ngồi lâu hại sức khỏe."],
designer:["Sửa thiết kế nhiều lần.","Ý tưởng bí.","Deadline gấp.","Bị ép giá.","Chạy theo xu hướng."],
teacher:["Áp lực thi cử.","Chấm bài nhiều.","Phụ huynh gây áp lực.","Thu nhập chưa cao.","Học sinh thiếu tập trung."],
marketing:["Thuật toán thay đổi.","Chi phí quảng cáo cao.","Áp lực KPI.","Nội dung bão hòa.","Cạnh tranh mạnh."],
data:["Dữ liệu bẩn.","Xử lý chậm.","Pipeline đổi liên tục.","Đồng bộ khó.","Áp lực bảo mật."],
game:["Bug cuối dự án.","Tối ưu khó.","Thiếu ngân sách.","Game flop.","Áp lực phát hành."],
business:["Rủi ro tài chính.","Quản lý khó.","Thị trường biến động.","Áp lực lợi nhuận.","Cạnh tranh cao."]
};

function careerData(career){

const dataMap={
dev:{salary5:rand(22,30),salary10:rand(45,65),skills:[rand(85,95),rand(55,70),rand(45,65)],color:"#00ffcc"},
designer:{salary5:rand(18,25),salary10:rand(35,50),skills:[rand(45,65),rand(85,98),rand(60,80)],color:"#ff66cc"},
teacher:{salary5:rand(14,20),salary10:rand(25,40),skills:[rand(55,70),rand(65,80),rand(85,98)],color:"#ffd166"},
marketing:{salary5:rand(20,28),salary10:rand(40,60),skills:[rand(55,70),rand(80,95),rand(80,95)],color:"#ff914d"},
data:{salary5:rand(28,40),salary10:rand(55,80),skills:[rand(90,98),rand(45,60),rand(50,65)],color:"#4dabf7"},
game:{salary5:rand(25,35),salary10:rand(50,75),skills:[rand(80,95),rand(70,90),rand(55,75)],color:"#9d4edd"},
business:{salary5:rand(30,45),salary10:rand(70,150),skills:[rand(65,80),rand(65,85),rand(90,100)],color:"#38b000"}
};

return dataMap[career];
}

/* ===== SIMULATE ===== */

let chartInstance;

function simulate(){

let name=document.getElementById("name").value||"Bạn";
let career=document.getElementById("career").value;
let advanced=document.getElementById("advancedMode").checked;

let data=careerData(career);

let vanDeHTML="<ul>";
randomMultiple(vanDeTheoNganh[career],3)
.forEach(v=>vanDeHTML+="<li>"+v+"</li>");
vanDeHTML+="</ul>";

document.getElementById("vanDe").innerHTML=vanDeHTML;

let match=rand(70,95);
if(advanced){startMatrix();match+=5;}
else stopMatrix();
if(match>100)match=100;

document.getElementById("output").style.display="block";

document.getElementById("story5").innerText=
`${name} - 5 năm: Thu nhập khoảng ${data.salary5} triệu/tháng`;

document.getElementById("story10").innerText=
`${name} - 10 năm: Thu nhập khoảng ${data.salary10} triệu/tháng`;

document.getElementById("advancedResult").innerText=
advanced?"Phân tích chuyên sâu đã kích hoạt.":"";

let bar=document.getElementById("matchBar");
bar.style.width="0%";
setTimeout(()=>{bar.style.width=match+"%";},200);

if(chartInstance)chartInstance.destroy();

chartInstance=new Chart(document.getElementById("skillChart"),{
type:'bar',
data:{
labels:["Logic","Sáng tạo","Giao tiếp"],
datasets:[{
label:"Kỹ năng",
data:data.skills,
backgroundColor:data.color,
borderRadius:8
}]
},
options:{
responsive:true,
scales:{y:{beginAtZero:true,max:100}}
}
});
}
</script>

</body>
</html>
