<!DOCTYPE html>
<html lang="vi">
<head> 
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/29/29302.png">
<meta charset="UTF-8">
<title>LifeSim AI Pro+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
    padding:20px;
}
    
.glow{
    animation:glowEffect 1.5s ease-in-out infinite alternate;
}

@keyframes glowEffect{
    from{
        box-shadow:0 0 10px rgba(0,255,200,0.3);
    }
    to{
        box-shadow:0 0 25px rgba(0,255,200,0.9);
    }
}
    
.result-box{
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.08);
    padding:18px;
    border-radius:12px;
    margin:15px 0;
    text-align:left;
    transition:0.4s;
    border:1px solid rgba(255,255,255,0.15);
}

.result-box:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.result-box h2{
    margin-top:0;
    color:#00ffcc;
}
.container{
    background: rgba(255,255,255,0.08);
    padding:25px;
    border-radius:15px;
    width:850px;
    margin:auto;
}
input, select, button{
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}
button{
    background:#00c9a7;
    color:white;
    cursor:pointer;
}
.result{
    margin-top:20px;
    background:rgba(0,0,0,0.4);
    padding:20px;
    border-radius:10px;
    display:none;
}
.progress-bar{
    width:100%;
    background:#444;
    border-radius:20px;
    overflow:hidden;
}
.progress{
    height:20px;
    background:#00ffcc;
    width:0%;
    transition:0.6s;
}
.loading{
    display:none;
    font-size:20px;
    margin-top:15px;
}
.spinner{
    border:4px solid #ccc;
    border-top:4px solid #00ffcc;
    border-radius:50%;
    width:25px;
    height:25px;
    animation:spin 1s linear infinite;
    display:inline-block;
}
@keyframes spin{
    100%{transform:rotate(360deg);}
}
canvas{
    background:white;
    border-radius:10px;
    margin-top:20px;
}
</style>
</head>
<body>

<h1>📖 LifeSim AI - PRO+</h1>

<div class="container">

<input type="text" id="name" placeholder="Nhập tên của bạn"><br>

<select id="personality">
<option value="logic">Tư duy logic</option>
<option value="creative">Sáng tạo</option>
<option value="social">Hướng ngoại</option>
<option value="leader">Lãnh đạo</option>
<option value="analyst">Phân tích dữ liệu</option>
<option value="independent">Độc lập</option>
<option value="adaptive">Thích nghi nhanh</option>
</select>

<select id="career">
<option value="dev">Lập trình viên</option>
<option value="designer">Thiết kế đồ họa</option>
<option value="teacher">Giáo viên</option>
<option value="marketing">Tiếp thị kỹ thuật số</option>
<option value="data">Kỹ sư dữ liệu</option>
<option value="game">Nhà làm game</option>
<option value="business">Doanh nhân</option>
</select>

<br>
<button onclick="simulate()">Phân tích bằng AI</button>

<div class="loading" id="loading">
<span class="spinner"></span> AI đang phân tích tương lai của bạn...
</div>

<div class="result" id="output">
    
<div class="result-box">
  <h2>🚀 Kết quả 5 năm</h2>
  <p id="story5"></p>
</div>

<div class="result-box">
  <h2>🌟 Kết quả 10 năm</h2>
  <p id="story10"></p>
</div>

<h3>Mức độ phù hợp</h3>
<div class="progress-bar">
<div class="progress" id="matchBar"></div>
</div>

<canvas id="skillChart"></canvas>
</div>

</div>

<script>
let chartInstance;

function careerData(career){
if(career==="dev"){
return {
salary5:"25 triệu/tháng",
salary10:"50 triệu/tháng",
skills:[90,60,50],
color:"#00ffcc",
desc5:"Bạn làm việc tại công ty công nghệ, tham gia nhiều dự án phần mềm.",
desc10:"Bạn trở thành senior developer hoặc leader team."
}
}
if(career==="designer"){
return {
salary5:"20 triệu/tháng",
salary10:"40 triệu/tháng",
skills:[50,95,70],
color:"#ff66cc"
desc5:"Bạn làm việc sáng tạo với thương hiệu và sản phẩm.",
desc10:"Bạn có thể mở studio riêng hoặc làm freelance quốc tế."
}
}
if(career==="teacher"){
return {
salary5:"15 triệu/tháng",
salary10:"30 triệu/tháng",
skills:[60,70,95],
color:"#ffd166"
desc5:"Bạn giảng dạy và truyền cảm hứng cho học sinh.",
desc10:"Bạn có thể trở thành chuyên gia giáo dục hoặc quản lý."
}
}
if(career==="marketing"){
return {
salary5:"22 triệu/tháng",
salary10:"45 triệu/tháng",
skills:[60,85,90],
color:"#ff914d"
desc5:"Bạn làm việc trong lĩnh vực marketing số, xây dựng thương hiệu online.",
desc10:"Bạn trở thành chuyên gia marketing hoặc quản lý chiến lược thương hiệu."
}
}

if(career==="data"){
return {
salary5:"30 triệu/tháng",
salary10:"60 triệu/tháng",
skills:[95,50,55],
color:"#4dabf7"
desc5:"Bạn phân tích dữ liệu lớn và tối ưu hệ thống doanh nghiệp.",
desc10:"Bạn trở thành Data Scientist cấp cao hoặc AI Specialist."
}
}

if(career==="game"){
return {
salary5:"28 triệu/tháng",
salary10:"55 triệu/tháng",
skills:[85,80,60],
color:"#9d4edd"
desc5:"Bạn tham gia phát triển game và xây dựng thế giới ảo.",
desc10:"Bạn có thể mở studio game riêng hoặc làm việc quốc tế."
}
}

if(career==="business"){
return {
salary5:"35 triệu/tháng",
salary10:"100 triệu/tháng",
skills:[70,75,95],
color:"#38b000"
desc5:"Bạn khởi nghiệp và xây dựng dự án kinh doanh riêng.",
desc10:"Bạn trở thành doanh nhân thành công và có hệ thống riêng."
}
}
}

function simulate(){
    
let btn = document.querySelector("button");
btn.disabled = true;
btn.innerText = "🤖 AI đang phân tích...";

document.getElementById("loading").style.display="block";
document.getElementById("output").style.display="none";

setTimeout(function(){

let name=document.getElementById("name").value;
let personality=document.getElementById("personality").value;
let personalityDesc = "";

if(personality==="logic") personalityDesc="Bạn có tư duy hệ thống và giải quyết vấn đề tốt.";
if(personality==="creative") personalityDesc="Bạn có khả năng sáng tạo và đổi mới cao.";
if(personality==="social") personalityDesc="Bạn giỏi giao tiếp và kết nối con người.";
if(personality==="leader") personalityDesc="Bạn có tố chất dẫn dắt và truyền cảm hứng.";
if(personality==="analyst") personalityDesc="Bạn phân tích dữ liệu và ra quyết định logic.";
if(personality==="independent") personalityDesc="Bạn làm việc độc lập và tự chủ tốt.";
if(personality==="adaptive") personalityDesc="Bạn thích nghi nhanh với môi trường mới.";
    
let career=document.getElementById("career").value;
let data=careerData(career);

document.getElementById("loading").style.display="none";
document.getElementById("output").style.display="block";
let boxes = document.querySelectorAll(".result-box");
boxes.forEach(box=>{
  box.classList.remove("glow");
  void box.offsetWidth;
  box.classList.add("glow");
});

document.getElementById("story5").innerText=
name+" - 5 năm sau: "+data.desc5+
"\n\nCá tính nổi bật: "+personalityDesc+
"\nThu nhập: "+data.salary5;

document.getElementById("story10").innerText=
name+" - 10 năm sau: "+data.desc10+" Thu nhập: "+data.salary10;

let match=65;

// dev
if(personality==="logic" && career==="dev") match=92;
if(personality==="analyst" && career==="dev") match=88;
if(personality==="independent" && career==="dev") match=85;

// designer
if(personality==="creative" && career==="designer") match=92;
if(personality==="adaptive" && career==="designer") match=85;

// teacher
if(personality==="social" && career==="teacher") match=92;
if(personality==="leader" && career==="teacher") match=88;
if(personality==="adaptive" && career==="teacher") match=85;

// marketing
if(personality==="social" && career==="marketing") match=92;
if(personality==="creative" && career==="marketing") match=88;

// data
if(personality==="analyst" && career==="data") match=95;
if(personality==="logic" && career==="data") match=90;

// game
if(personality==="creative" && career==="game") match=92;
if(personality==="logic" && career==="game") match=85;

// business
if(personality==="leader" && career==="business") match=95;
if(personality==="adaptive" && career==="business") match=88;

let bar = document.getElementById("matchBar");
bar.style.width = "0%";

setTimeout(()=>{
  bar.style.width = match + "%";
},200);

if(chartInstance) chartInstance.destroy();

chartInstance = new Chart(document.getElementById("skillChart"),{
type:'bar',
data:{
labels:["Logic","Sáng tạo","Giao tiếp"],
datasets:[{
label:"Kỹ năng cần thiết",
data:data.skills,
backgroundColor:data.color,
borderRadius:8
}]
},
options:{
  responsive:true,
  animation:{
    duration:1500,
    easing:'easeOutQuart'
  },
  scales:{
    y:{
      beginAtZero:true,
      max:100
    }
  }
}
});
    btn.disabled = false;
btn.innerText = "🚀 Phân tích tương lai";

},2500);
}
</script>

</body>
</html>
